// ══════════════════════════════════════════
// DRAW / ANNOTATIONS
// ══════════════════════════════════════════
let drawState = { epIdx:0, scIdx:0, tool:'arrow', drawing:false, startX:0, startY:0, current:null, items:[], selectedIdx:-1, dragOffsetX:0, dragOffsetY:0 };

function renderAnnotation(a) {
  if(a.type === 'arrow') {
    const angle = Math.atan2(a.y2-a.y1, a.x2-a.x1);
    const hl = 20, ha = 0.5;
    const ax1 = a.x2 - hl*Math.cos(angle-ha), ay1 = a.y2 - hl*Math.sin(angle-ha);
    const ax2 = a.x2 - hl*Math.cos(angle+ha), ay2 = a.y2 - hl*Math.sin(angle+ha);
    return `<line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}" stroke="${a.color}" stroke-width="${a.sw}" stroke-linecap="round"/>
      <polygon points="${a.x2},${a.y2} ${ax1},${ay1} ${ax2},${ay2}" fill="${a.color}"/>`;
  }
  if(a.type === 'arc') {
    const mx = (a.x1+a.x2)/2, my = (a.y1+a.y2)/2;
    const dx = a.x2-a.x1, dy = a.y2-a.y1;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const bulge = a.bulge || 0.4;
    const cx = mx - dy*bulge, cy = my + dx*bulge;
    const tx = a.x2 - cx, ty = a.y2 - cy;
    const angle = Math.atan2(ty, tx);
    const hl = 20, ha = 0.5;
    const ax1 = a.x2 - hl*Math.cos(angle-ha), ay1 = a.y2 - hl*Math.sin(angle-ha);
    const ax2 = a.x2 - hl*Math.cos(angle+ha), ay2 = a.y2 - hl*Math.sin(angle+ha);
    return `<path d="M${a.x1},${a.y1} Q${cx},${cy} ${a.x2},${a.y2}" stroke="${a.color}" stroke-width="${a.sw}" fill="none" stroke-linecap="round"/>
      <polygon points="${a.x2},${a.y2} ${ax1},${ay1} ${ax2},${ay2}" fill="${a.color}"/>`;
  }
  if(a.type === 'rect') {
    const x = Math.min(a.x1,a.x2), y = Math.min(a.y1,a.y2);
    const w = Math.abs(a.x2-a.x1), h = Math.abs(a.y2-a.y1);
    return `<rect x="${x}" y="${y}" width="${w}" height="${h}" stroke="${a.color}" stroke-width="${a.sw}" fill="none" rx="3"/>`;
  }
  if(a.type === 'text') {
    return `<text x="${a.x1}" y="${a.y1}" fill="${a.color}" font-size="${a.fs||16}" font-family="'Noto Sans KR',sans-serif" font-weight="600">${a.text||''}</text>`;
  }
  return '';
}

function openDraw(epIdx, scIdx) {
  drawState.epIdx = epIdx;
  drawState.scIdx = scIdx;
  drawState.flipped = false;
  drawState.selectedIdx = -1;
  const s = storyboardData.episodes[epIdx].scenes[scIdx];
  drawState.items = s.annotations ? JSON.parse(JSON.stringify(s.annotations)) : [];

  document.getElementById('drawBgImg').src = s.img;
  document.getElementById('drawBgImg').style.transform = '';
  redrawSvg();
  document.getElementById('drawModal').classList.add('show');

  // Init tool buttons
  document.querySelectorAll('.draw-tool').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tool === drawState.tool);
    btn.onclick = () => {
      document.querySelectorAll('.draw-tool').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      drawState.tool = btn.dataset.tool;
      drawState.selectedIdx = -1;
      document.querySelector('.draw-canvas-wrap').classList.toggle('select-mode', drawState.tool === 'select');
      redrawSvg();
    };
  });

  // Init SVG events
  const svg = document.getElementById('drawSvg');
  svg.onpointerdown = drawStart;
  svg.onpointermove = drawMove;
  svg.onpointerup = drawEnd;
  svg.onpointercancel = drawEnd;
}

function closeDraw() {
  document.getElementById('drawModal').classList.remove('show');
  // Reset flip preview
  document.getElementById('drawBgImg').style.transform = '';
  drawState.flipped = false;
}

function saveDraw() {
  const s = storyboardData.episodes[drawState.epIdx].scenes[drawState.scIdx];
  s.annotations = drawState.items;
  // Apply flip if toggled
  if(drawState.flipped) {
    flipImg(drawState.epIdx, drawState.scIdx);
  }
  closeDraw();
  render();
}

function flipDrawImg() {
  drawState.flipped = !drawState.flipped;
  const img = document.getElementById('drawBgImg');
  img.style.transform = drawState.flipped ? 'scaleX(-1)' : '';
}

function clearDraw() {
  drawState.items = [];
  redrawSvg();
}

function undoDraw() {
  drawState.items.pop();
  redrawSvg();
}

function redrawSvg() {
  const svg = document.getElementById('drawSvg');
  svg.innerHTML = drawState.items.map((a, i) => {
    let html = renderAnnotation(a);
    // Selection highlight
    if(drawState.tool === 'select' && i === drawState.selectedIdx) {
      if(a.type === 'text') {
        html += `<rect x="${a.x1-4}" y="${a.y1-16}" width="80" height="22" fill="none" stroke="var(--kakao)" stroke-width="1" stroke-dasharray="4" rx="2"/>`;
      } else {
        const cx = (a.x1+(a.x2||a.x1))/2, cy = (a.y1+(a.y2||a.y1))/2;
        html += `<circle cx="${a.x1}" cy="${a.y1}" r="5" fill="rgba(229,180,77,0.6)" stroke="var(--kakao)" stroke-width="1"/>`;
        if(a.x2 !== undefined) html += `<circle cx="${a.x2}" cy="${a.y2}" r="5" fill="rgba(229,180,77,0.6)" stroke="var(--kakao)" stroke-width="1"/>`;
      }
    }
    return html;
  }).join('');
}

function findAnnotationAt(px, py) {
  const threshold = 25;
  // Search in reverse (top items first)
  for(let i = drawState.items.length - 1; i >= 0; i--) {
    const a = drawState.items[i];
    if(a.type === 'text') {
      if(px >= a.x1-10 && px <= a.x1+100 && py >= a.y1-20 && py <= a.y1+5) return i;
    } else if(a.type === 'rect') {
      const x = Math.min(a.x1,a.x2), y = Math.min(a.y1,a.y2);
      const w = Math.abs(a.x2-a.x1), h = Math.abs(a.y2-a.y1);
      // Hit on edges
      const onEdge = (px>=x-threshold && px<=x+w+threshold && py>=y-threshold && py<=y+h+threshold) &&
                     !(px>=x+threshold && px<=x+w-threshold && py>=y+threshold && py<=y+h-threshold);
      if(onEdge) return i;
    } else {
      // Arrow/arc: distance from line/midpoint
      const cx = (a.x1+a.x2)/2, cy = (a.y1+a.y2)/2;
      const d1 = Math.sqrt((px-a.x1)**2+(py-a.y1)**2);
      const d2 = Math.sqrt((px-a.x2)**2+(py-a.y2)**2);
      const dm = Math.sqrt((px-cx)**2+(py-cy)**2);
      if(d1 < threshold || d2 < threshold || dm < threshold) return i;
    }
  }
  return -1;
}

function getSvgCoords(e) {
  const svg = document.getElementById('drawSvg');
  const rect = svg.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / rect.width * 1000,
    y: (e.clientY - rect.top) / rect.height * 281
  };
}

function drawStart(e) {
  e.preventDefault();
  const p = getSvgCoords(e);
  const color = document.getElementById('drawColor').value;
  const sw = parseInt(document.getElementById('drawStroke').value);

  // Select tool: find and drag existing item
  if(drawState.tool === 'select') {
    const hit = findAnnotationAt(p.x, p.y);
    drawState.selectedIdx = hit;
    if(hit >= 0) {
      drawState.drawing = true;
      drawState.dragOffsetX = p.x;
      drawState.dragOffsetY = p.y;
      e.target.setPointerCapture(e.pointerId);
    }
    redrawSvg();
    return;
  }

  // Text tool: click to place, then input
  if(drawState.tool === 'text') {
    const text = prompt('텍스트 입력:');
    if(text && text.trim()) {
      drawState.items.push({ type:'text', x1:p.x, y1:p.y, color, fs:16, text:text.trim() });
      redrawSvg();
    }
    return;
  }

  drawState.drawing = true;
  drawState.startX = p.x;
  drawState.startY = p.y;
  drawState.arcMidPoints = [];
  drawState.current = { type:drawState.tool, x1:p.x, y1:p.y, x2:p.x, y2:p.y, color, sw };
  if(drawState.tool === 'arc') drawState.current.bulge = 0.35;
  e.target.setPointerCapture(e.pointerId);
}

function drawMove(e) {
  if(!drawState.drawing) return;
  const p = getSvgCoords(e);

  // Select mode: move selected item
  if(drawState.tool === 'select' && drawState.selectedIdx >= 0) {
    const dx = p.x - drawState.dragOffsetX;
    const dy = p.y - drawState.dragOffsetY;
    const a = drawState.items[drawState.selectedIdx];
    a.x1 += dx; a.y1 += dy;
    if(a.x2 !== undefined) { a.x2 += dx; a.y2 += dy; }
    drawState.dragOffsetX = p.x;
    drawState.dragOffsetY = p.y;
    redrawSvg();
    return;
  }

  if(!drawState.current) return;
  drawState.current.x2 = p.x;
  drawState.current.y2 = p.y;

  // For arc: track mouse path to calculate curve direction
  if(drawState.current.type === 'arc') {
    drawState.arcMidPoints.push({x:p.x, y:p.y});
    // Calculate bulge from perpendicular offset of midpoint of path
    const mid = drawState.arcMidPoints[Math.floor(drawState.arcMidPoints.length/2)];
    if(mid) {
      const x1=drawState.current.x1, y1=drawState.current.y1;
      const dx=p.x-x1, dy=p.y-y1;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if(dist > 10) {
        // Signed perpendicular distance of mid-path point from start→end line
        const perp = ((mid.x-x1)*dy - (mid.y-y1)*dx) / dist;
        drawState.current.bulge = Math.max(-1, Math.min(1, perp / dist * 2)) || 0.35;
      }
    }
  }

  // Preview
  const svg = document.getElementById('drawSvg');
  svg.innerHTML = drawState.items.map(a => renderAnnotation(a)).join('') + renderAnnotation(drawState.current);
}

function drawEnd(e) {
  if(!drawState.drawing) return;
  drawState.drawing = false;

  // Select mode: just release
  if(drawState.tool === 'select') {
    return;
  }

  if(!drawState.current) return;
  const p = getSvgCoords(e);
  drawState.current.x2 = p.x;
  drawState.current.y2 = p.y;
  // Only add if dragged some distance
  const dx = Math.abs(drawState.current.x2 - drawState.current.x1);
  const dy = Math.abs(drawState.current.y2 - drawState.current.y1);
  if(dx > 5 || dy > 5) {
    drawState.items.push(drawState.current);
  }
  drawState.current = null;
  redrawSvg();
}

// ══════════════════════════════════════════
// AUTOSAVE (IndexedDB)
// ══════════════════════════════════════════
const DB_NAME = 'storyboard_db';
const DB_STORE = 'data';
const DB_KEY = 'current';
let autoSaveTimer = null;
let dbReady = false;
let idb = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      e.target.result.createObjectStore(DB_STORE);
    };
    req.onsuccess = (e) => {
      idb = e.target.result;
      dbReady = true;
      resolve(idb);
    };
    req.onerror = () => reject(req.error);
  });
}

function autoSave() {
  if(!dbReady || isViewMode) return;
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try {
      const tx = idb.transaction(DB_STORE, 'readwrite');
      tx.objectStore(DB_STORE).put(JSON.parse(JSON.stringify(storyboardData)), DB_KEY);
      // Update save indicator
      const indicator = document.getElementById('saveStatus');
      if(indicator) {
        indicator.textContent = '✓ 저장됨';
        indicator.style.color = 'var(--accent-green)';
        setTimeout(() => { indicator.textContent = ''; }, 2000);
      }
    } catch(err) { console.warn('Autosave failed:', err); }
  }, 1000); // 1초 디바운스
}

function loadFromDB() {
  return new Promise((resolve) => {
    if(!dbReady) { resolve(null); return; }
    const tx = idb.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(DB_KEY);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => resolve(null);
  });
}

function clearDB() {
  if(!dbReady) return;
  if(!confirm('자동저장 데이터를 초기화할까요? 이 작업은 되돌릴 수 없습니다.')) return;
  const tx = idb.transaction(DB_STORE, 'readwrite');
  tx.objectStore(DB_STORE).delete(DB_KEY);
  location.reload();
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if(e.key === 'Escape') closeModal();
});

// Init
const isViewMode = new URLSearchParams(window.location.search).has('view');
if(isViewMode) document.body.classList.add('view-mode');

(async function init() {
  try {
    await openDB();
  } catch(err) {
    console.warn('IndexedDB 초기화 실패:', err);
  }

  if(isViewMode) {
    // ── 읽기모드: version.json 체크 → 변경 시에만 data.json 재다운로드 ──
    let loaded = false;
    try {
      // 1) 서버 버전 체크 (수십 바이트만 fetch)
      const verRes = await fetch('version.json', { cache:'no-store' });
      const serverVer = verRes.ok ? (await verRes.json()).version : null;

      // 2) 로컬 캐시 로드
      const saved = await loadFromDB();
      const localVer = saved?._dataVersion || null;

      if(saved && saved.episodes && localVer === serverVer) {
        // 버전 동일 → 캐시 사용
        Object.assign(storyboardData, saved);
        console.log('읽기모드: 캐시 사용 (v' + localVer + ')');
        loaded = true;
      } else {
        // 버전 다르거나 캐시 없음 → data.json 다운로드
        const res = await fetch('data.json');
        if(res.ok) {
          const data = await res.json();
          if(data.episodes) {
            data._dataVersion = serverVer;
            Object.assign(storyboardData, data);
            // 읽기모드에서도 캐시 저장 (다음 방문 시 빠르게)
            try {
              const tx = idb.transaction(DB_STORE, 'readwrite');
              tx.objectStore(DB_STORE).put(JSON.parse(JSON.stringify(storyboardData)), DB_KEY);
            } catch(e) {}
            console.log('읽기모드: data.json 다운로드 (v' + serverVer + ')');
            loaded = true;
          }
        }
      }
    } catch(err) {
      console.log('버전 체크 실패 — IndexedDB 폴백');
    }

    // 모든 시도 실패 시 IndexedDB 폴백
    if(!loaded) {
      try {
        const saved = await loadFromDB();
        if(saved && saved.episodes) {
          Object.assign(storyboardData, saved);
          console.log('읽기모드: 오프라인 폴백');
        }
      } catch(e) {}
    }
  } else {
    // ── 편집모드: IndexedDB 우선, 없으면 data.json ──
    let hasLocal = false;
    try {
      const saved = await loadFromDB();
      if(saved && saved.episodes) {
        Object.assign(storyboardData, saved);
        console.log('편집모드: 자동저장 데이터 복원됨');
        hasLocal = true;
      }
    } catch(e) {}

    if(!hasLocal) {
      try {
        const res = await fetch('data.json');
        if(res.ok) {
          const data = await res.json();
          if(data.episodes) {
            Object.assign(storyboardData, data);
            console.log('편집모드: data.json 초기 로드');
            autoSave();
          }
        }
      } catch(err) {
        console.log('data.json 없음 — 기본 데이터 사용');
      }
    }
  }

  render();
  if(isViewMode) {
    document.querySelectorAll('[contenteditable]').forEach(el => {
      el.contentEditable = 'false';
    });
  }
})();
</script>
</body>
</html>
